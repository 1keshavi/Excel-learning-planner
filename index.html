<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Excel for Data Analytics — 7-Day Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-top">
      <div>
        <h1>Excel for <span>Data Analytics</span></h1>
        <p>7-day structured learning plan — beginner to advanced.</p>
      </div>
      <div class="tag">📊 17 hrs · 7 days · 20 sessions</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-val">17</div>
      <div class="stat-label">Total hours</div>
    </div>
    <div class="stat">
      <div class="stat-val teal" id="completed-count">0</div>
      <div class="stat-label">Sessions done</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="pct-done">0%</div>
      <div class="stat-label">Completed</div>
    </div>
  </div>

  <div class="prog-wrap" id="progress-bar"></div>
  <div class="day-tabs" id="day-tabs"></div>
  <div class="day-card" id="day-card"></div>

</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
